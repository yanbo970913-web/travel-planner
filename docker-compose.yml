# 本機開發用：一鍵起 postgres + backend + frontend
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/travel
      JWT_SECRET: dev_secret_change_me
      # 主力 AI（Groq）；本機若要實測 AI 生成，先 export GROQ_API_KEY
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-dummy_key_for_now}
      FRONTEND_URL: http://localhost:5173
      # 天氣（Open-Meteo + Nominatim）免金鑰，無需設定
      # 未設 SMTP_HOST → 寄信退回 log fallback
    ports:
      - "8000:8000"

  frontend:
    image: node:24-alpine
    working_dir: /app
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

volumes:
  pgdata:
